services:
  postgres:
    image: postgres:16-alpine
    container_name: decodedsound_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: decodedsound
      POSTGRES_PASSWORD: decodedsound_pass
      POSTGRES_DB: decodedsound
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U decodedsound' ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
